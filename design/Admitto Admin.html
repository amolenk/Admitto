   ============================================================ */

:root {
  --radius: 0.625rem;
  --font-sans: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif;
  --font-display: 'Fraunces', ui-serif, Georgia, serif;
  --font-mono: 'Geist Mono', ui-monospace, monospace;
}

/* ---------- Theme: Editorial (Stripe/Vercel-esque) ---------- */
body.theme-editorial {
  --font-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-display: 'Fraunces', ui-serif, Georgia, serif;
  --font-mono: 'Geist Mono', ui-monospace, monospace;

  --background: oklch(0.995 0.002 260);
  --foreground: oklch(0.18 0.02 265);
  --card: oklch(1 0 0);
  --card-foreground: oklch(0.18 0.02 265);

  --muted-foreground: oklch(0.50 0.02 265);
  --accent: oklch(0.96 0.008 265);
  --accent-foreground: oklch(0.20 0.02 265);
  --border: oklch(0.92 0.006 265);
  --input: oklch(0.92 0.006 265);
  --primary: oklch(0.48 0.17 268);
  --primary-foreground: oklch(0.99 0.003 268);
  --ring: oklch(0.48 0.17 268);
  --success: oklch(0.58 0.13 160);
  --warning: oklch(0.72 0.14 70);
  --destructive: oklch(0.55 0.22 27);
  --sidebar: oklch(0.985 0.004 265);
  --sidebar-foreground: oklch(0.22 0.02 265);
  --sidebar-border: oklch(0.92 0.006 265);
  --accent-2: oklch(0.72 0.14 70);  /* amber for hero gradient */
  --accent-3: oklch(0.65 0.17 330); /* pink complement */
}
body.theme-editorial.dark {
  --background: oklch(0.16 0.015 265);
  --foreground: oklch(0.98 0.003 265);
  --card: oklch(0.21 0.02 265);
  --card-foreground: oklch(0.98 0.003 265);
  --muted: oklch(0.24 0.018 265);
  --muted-foreground: oklch(0.70 0.015 265);
  --accent: oklch(0.26 0.02 265);
  --accent-foreground: oklch(0.98 0 0);
  --border: oklch(1 0 0 / 0.09);
  --input: oklch(1 0 0 / 0.14);
  --primary: oklch(0.68 0.18 268);
  --primary-foreground: oklch(0.15 0.04 268);
  --ring: oklch(0.68 0.18 268);
  --sidebar: oklch(0.19 0.018 265);
  --sidebar-foreground: oklch(0.98 0.003 265);
  --sidebar-border: oklch(1 0 0 / 0.08);
}

/* ---------- Theme: Community (warm, friendly) ---------- */
body.theme-community {
  --font-sans: 'Inter', ui-sans-serif, system-ui, sans-serif;
  --font-display: 'Instrument Serif', ui-serif, Georgia, serif;
  --font-mono: 'Geist Mono', ui-monospace, monospace;
  --radius: 0.875rem;

  --background: oklch(0.985 0.008 75);
  --foreground: oklch(0.22 0.02 40);
  --card: oklch(0.995 0.005 75);
  --card-foreground: oklch(0.22 0.02 40);
  --muted: oklch(0.955 0.012 75);
  --muted-foreground: oklch(0.48 0.02 45);
  --accent: oklch(0.95 0.015 70);
  --accent-foreground: oklch(0.25 0.03 40);
  --border: oklch(0.91 0.012 70);
  --input: oklch(0.91 0.012 70);
  --primary: oklch(0.56 0.16 40);    /* terracotta */
  --primary-foreground: oklch(0.99 0.005 70);
  --ring: oklch(0.56 0.16 40);
  --success: oklch(0.58 0.11 155);
  --warning: oklch(0.72 0.14 70);
  --destructive: oklch(0.54 0.22 27);
  --sidebar: oklch(0.97 0.012 75);
  --sidebar-foreground: oklch(0.25 0.025 40);
  --sidebar-border: oklch(0.90 0.014 70);
  --accent-2: oklch(0.74 0.14 80);
  --accent-3: oklch(0.62 0.14 20);
}
body.theme-community.dark {
  --background: oklch(0.19 0.012 40);
  --foreground: oklch(0.97 0.006 75);
  --card: oklch(0.23 0.015 40);
  --card-foreground: oklch(0.97 0.006 75);
  --muted: oklch(0.26 0.014 40);
  --muted-foreground: oklch(0.70 0.012 60);
  --accent: oklch(0.28 0.018 40);
  --accent-foreground: oklch(0.97 0.006 75);
  --border: oklch(1 0 0 / 0.10);
  --input: oklch(1 0 0 / 0.14);
  --primary: oklch(0.70 0.14 45);
  --primary-foreground: oklch(0.18 0.04 40);
  --ring: oklch(0.70 0.14 45);
  --sidebar: oklch(0.21 0.014 40);
  --sidebar-foreground: oklch(0.97 0.006 75);
  --sidebar-border: oklch(1 0 0 / 0.08);
}

/* ---------- Theme: Linear (sharp, mono, minimal) ---------- */
body.theme-linear {
  --font-sans: 'Geist', ui-sans-serif, system-ui, sans-serif;
  --font-display: 'Geist', ui-sans-serif, system-ui, sans-serif;
  --font-mono: 'Geist Mono', ui-monospace, monospace;
  --radius: 0.3rem;

  --background: oklch(0.995 0.001 270);
  --foreground: oklch(0.14 0.01 270);
  --card: oklch(1 0 0);
  --card-foreground: oklch(0.14 0.01 270);
  --muted: oklch(0.97 0.002 270);
  --muted-foreground: oklch(0.52 0.012 270);
  --accent: oklch(0.96 0.003 270);
  --accent-foreground: oklch(0.18 0.01 270);
  --border: oklch(0.91 0.004 270);
  --input: oklch(0.91 0.004 270);
  --primary: oklch(0.20 0.01 270);
  --primary-foreground: oklch(0.99 0 0);
  --ring: oklch(0.60 0.18 290);
  --success: oklch(0.62 0.13 150);
  --warning: oklch(0.72 0.14 70);
  --destructive: oklch(0.55 0.22 27);
  --sidebar: oklch(0.985 0.002 270);
  --sidebar-foreground: oklch(0.22 0.01 270);
  --sidebar-border: oklch(0.91 0.004 270);
  --accent-2: oklch(0.60 0.18 290);  /* violet */
  --accent-3: oklch(0.70 0.16 200);  /* cyan complement */
}
body.theme-linear.dark {
  --background: oklch(0.135 0.008 270);
  --foreground: oklch(0.98 0.002 270);
  --card: oklch(0.17 0.01 270);
  --card-foreground: oklch(0.98 0.002 270);
  --muted: oklch(0.20 0.01 270);
  --muted-foreground: oklch(0.68 0.01 270);
  --accent: oklch(0.22 0.012 270);
  --accent-foreground: oklch(0.98 0.002 270);
  --border: oklch(1 0 0 / 0.08);
  --input: oklch(1 0 0 / 0.12);
  --primary: oklch(0.98 0.002 270);
  --primary-foreground: oklch(0.14 0.01 270);
  --ring: oklch(0.68 0.18 290);
  --sidebar: oklch(0.155 0.008 270);
  --sidebar-foreground: oklch(0.98 0.002 270);
  --sidebar-border: oklch(1 0 0 / 0.08);
}

/* ---------- Density ---------- */
body.density-compact { --space: 0.75; }
body.density-comfortable { --space: 1; }
body.density-roomy { --space: 1.25; }

/* ---------- Base ---------- */
* { border-color: var(--border); }
html, body { height: 100%; }
body {
  font-family: var(--font-sans);
  background: var(--background);
  color: var(--foreground);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "cv11", "ss01";
}
.font-display { font-family: var(--font-display); }
.font-mono { font-family: var(--font-mono); }

/* Color helpers bound to tokens */
.bg-background { background: var(--background); }
.bg-card       { background: var(--card); }
.bg-muted      { background: var(--muted); }
.bg-accent     { background: var(--accent); }
.bg-sidebar    { background: var(--sidebar); }
.bg-primary    { background: var(--primary); }
.bg-primary\/10 { background: color-mix(in oklch, var(--primary) 10%, transparent); }
.bg-primary\/15 { background: color-mix(in oklch, var(--primary) 15%, transparent); }
.bg-primary\/5  { background: color-mix(in oklch, var(--primary) 5%, transparent); }
.text-fg       { color: var(--foreground); }
.text-muted-fg { color: var(--muted-foreground); }
.text-primary  { color: var(--primary); }
.text-primary-fg { color: var(--primary-foreground); }
.text-sidebar-fg { color: var(--sidebar-foreground); }
.text-success  { color: var(--success); }
.text-warning  { color: var(--warning); }
.text-destructive { color: var(--destructive); }
.border-default { border-color: var(--border); }
.border-sidebar { border-color: var(--sidebar-border); }
.ring-primary  { --tw-ring-color: var(--primary); }

/* Cards */
.card {
  background: var(--card);
  color: var(--card-foreground);
  border: 1px solid var(--border);
  border-radius: calc(var(--radius) + 2px);
}

/* Buttons (shadcn-ish) */
.btn {
  display: inline-flex; align-items: center; justify-content: center;
  gap: 0.5rem; height: 2.25rem; padding: 0 0.875rem;
  border-radius: var(--radius);
  font-size: 0.875rem; font-weight: 500;
  transition: background 120ms ease, color 120ms ease, border-color 120ms ease, transform 80ms;
  cursor: pointer; white-space: nowrap;
  border: 1px solid transparent;
}
.btn:active { transform: translateY(0.5px); }
.btn-primary {
  background: var(--primary); color: var(--primary-foreground);
}
.btn-primary:hover { background: color-mix(in oklch, var(--primary) 88%, black); }
.btn-outline {
  background: var(--card); color: var(--foreground); border-color: var(--border);
}
.btn-outline:hover { background: var(--accent); }
.btn-ghost { background: transparent; color: var(--foreground); }
.btn-ghost:hover { background: var(--accent); }
.btn-sm { height: 1.875rem; padding: 0 0.625rem; font-size: 0.8125rem; border-radius: calc(var(--radius) - 1px); }

/* Badge */
.badge {
  display: inline-flex; align-items: center; gap: 0.375rem;
  padding: 0.125rem 0.5rem;
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 0.75rem; font-weight: 500;
  background: var(--card);
  color: var(--foreground);
}
.badge-success { color: var(--success); border-color: color-mix(in oklch, var(--success) 30%, var(--border)); background: color-mix(in oklch, var(--success) 8%, var(--card)); }
.badge-warning { color: var(--warning); border-color: color-mix(in oklch, var(--warning) 30%, var(--border)); background: color-mix(in oklch, var(--warning) 10%, var(--card)); }
.badge-primary { color: var(--primary); border-color: color-mix(in oklch, var(--primary) 30%, var(--border)); background: color-mix(in oklch, var(--primary) 8%, var(--card)); }
.badge-muted   { color: var(--muted-foreground); }

/* Live pulse */
.pulse-dot { position: relative; display: inline-block; width: 0.5rem; height: 0.5rem; border-radius: 999px; background: var(--success); }
.pulse-dot::after {
  content: ""; position: absolute; inset: -3px; border-radius: 999px;
  background: var(--success); opacity: 0.3; animation: pulse 1.8s ease-out infinite;
}
@keyframes pulse { 0%{transform:scale(0.8);opacity:.45} 100%{transform:scale(2.2);opacity:0} }

/* Inputs */
.input {
  height: 2.25rem; width: 100%; padding: 0 0.75rem;
  background: var(--card); border: 1px solid var(--border);
  border-radius: var(--radius); font-size: 0.875rem;
  color: var(--foreground);
}
.input:focus { outline: 2px solid color-mix(in oklch, var(--ring) 50%, transparent); outline-offset: 1px; border-color: var(--ring); }
.textarea { min-height: 5.5rem; padding: 0.5rem 0.75rem; resize: vertical; }

/* Subtle scrollbars */
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: color-mix(in oklch, var(--muted-foreground) 30%, transparent); border-radius: 999px; border: 2px solid var(--background); }
*::-webkit-scrollbar-track { background: transparent; }

/* Hero gradient — theme-aware */
.hero-gradient {
  background:
    radial-gradient(circle at 0% 100%, color-mix(in oklch, var(--primary) 35%, transparent), transparent 50%),
    radial-gradient(circle at 90% 0%, color-mix(in oklch, var(--accent-2) 28%, transparent), transparent 55%),
    radial-gradient(circle at 60% 100%, color-mix(in oklch, var(--accent-3) 22%, transparent), transparent 60%),
    var(--card);
}
.hero-gradient-dark { filter: brightness(0.95) saturate(1.05); }

/* Ticket perforation — used as divider in hero */
.ticket-perf {
  --perf-c: color-mix(in oklch, var(--border) 80%, transparent);
  background-image: radial-gradient(circle at 50% 50%, var(--background) 4px, transparent 4.5px);
  background-size: 16px 16px;
  background-position: 0 50%;
  background-repeat: repeat-x;
  height: 16px;
}

/* Capacity bar */
.bar { width: 100%; height: 6px; background: var(--muted); border-radius: 999px; overflow: hidden; }
.bar > span { display: block; height: 100%; background: var(--primary); border-radius: 999px; transition: width 400ms ease; }

/* Sparkline container */
.sparkline { width: 100%; height: 56px; }

/* Mono number */
.num { font-family: var(--font-mono); font-variant-numeric: tabular-nums; letter-spacing: -0.01em; }

/* Section label */
.eyebrow { font-size: 0.6875rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted-foreground); font-weight: 600; }

/* Divider */
.hr { height: 1px; background: var(--border); width: 100%; }

/* kbd */
kbd { font-family: var(--font-mono); font-size: 0.72rem; padding: 1px 6px; border: 1px solid var(--border); border-bottom-width: 2px; border-radius: 4px; background: var(--muted); color: var(--muted-foreground); }

/* Selectable tab */
.tab {
  display: inline-flex; align-items: center; gap: 0.5rem;
  padding: 0.5rem 0.875rem; border-radius: calc(var(--radius) - 2px);
  font-size: 0.875rem; color: var(--muted-foreground);
  cursor: pointer; border: 1px solid transparent;
}
.tab[data-active="true"] { background: var(--card); color: var(--foreground); border-color: var(--border); box-shadow: 0 1px 2px rgba(0,0,0,0.03); }
.tab-group { background: var(--muted); padding: 4px; border-radius: var(--radius); display: inline-flex; gap: 2px; }

/* Sidebar item */
.side-item {
  display: flex; align-items: center; gap: 0.625rem;
  padding: 0.4rem 0.625rem; border-radius: calc(var(--radius) - 2px);
  font-size: 0.8125rem; color: var(--sidebar-foreground);
  cursor: pointer; width: 100%; text-align: left;
  border: 1px solid transparent;
}
.side-item:hover { background: color-mix(in oklch, var(--sidebar-foreground) 5%, transparent); }
.side-item[data-active="true"] {
  background: var(--card); border-color: var(--border);
  color: var(--foreground); font-weight: 500;
  box-shadow: 0 1px 2px rgba(0,0,0,0.03);
}

/* Data table row hover */
.row:hover { background: color-mix(in oklch, var(--accent) 70%, transparent); }

/* Keep app container widths */
.container-q { container-type: inline-size; }

/* Tweaks panel */
.tweaks {
  position: fixed; right: 16px; bottom: 16px; width: 280px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: calc(var(--radius) + 2px);
  box-shadow: 0 20px 40px -20px rgba(0,0,0,0.25), 0 8px 16px -8px rgba(0,0,0,0.12);
  z-index: 50; padding: 14px;
}

/* Wordmark ticket */
.wordmark-ticket {
  width: 28px; height: 28px; border-radius: 8px;
  background: linear-gradient(135deg, var(--primary), color-mix(in oklch, var(--primary) 60%, var(--accent-2)));
  position: relative; flex: none;
  display: grid; place-items: center; color: var(--primary-foreground);
  box-shadow: inset 0 0 0 1px color-mix(in oklch, var(--primary-foreground) 20%, transparent);
}
.wordmark-ticket::before,
.wordmark-ticket::after {
  content: ""; position: absolute; width: 6px; height: 6px; border-radius: 999px; background: var(--sidebar); top: 50%; transform: translateY(-50%);
}
.wordmark-ticket::before { left: -3px; }
.wordmark-ticket::after { right: -3px; }
.theme-linear .wordmark-ticket { border-radius: 4px; }

/* Fine grid background for empty states */
.bg-grid {
  background-image:
    linear-gradient(to right, color-mix(in oklch, var(--border) 60%, transparent) 1px, transparent 1px),
    linear-gradient(to bottom, color-mix(in oklch, var(--border) 60%, transparent) 1px, transparent 1px);
  background-size: 24px 24px;
}

/* Minor util */
.divide-y-border > * + * { border-top: 1px solid var(--border); }

</style>

function Sparkline({ data, color = "var(--primary)" }) {
  const w = 320, h = 56, pad = 4;
  const max = Math.max(...data);
  const min = 0;
  const step = (w - pad*2) / (data.length - 1);
  const pts = data.map((v,i) => [pad + i*step, h - pad - ((v-min)/(max-min)) * (h - pad*2)]);
  const path = "M " + pts.map(p => p.join(",")).join(" L ");
  const area = path + ` L ${pts[pts.length-1][0]},${h-pad} L ${pts[0][0]},${h-pad} Z`;
  return (
    <svg viewBox={`0 0 ${w} ${h}`} className="sparkline" preserveAspectRatio="none">
      <defs>
        <linearGradient id="spark" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.25"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <path d={area} fill="url(#spark)"/>
      <path d={path} fill="none" stroke={color} strokeWidth="1.75" strokeLinecap="round" strokeLinejoin="round"/>
      {pts.map((p,i) => <circle key={i} cx={p[0]} cy={p[1]} r={i===pts.length-1?3:0} fill={color}/>)}
    </svg>
  );
}

// Registrations table — filterable list of attendees
function RegistrationsPage() {
  const all = AZURE_FEST.attendees;
  const [query, setQuery]   = useState("");
  const [status, setStatus] = useState("all");   // all | confirmed | pending | cancelled
  const [ticket, setTicket] = useState("all");
  const [sortKey, setSortKey] = useState("registered");
  const [sortDir, setSortDir] = useState("desc");
  const [selected, setSelected] = useState(() => new Set());

  const ticketNames = ["all", ...Array.from(new Set(all.map(a => a.ticket)))];

  const counts = {
    all:       all.length,
    confirmed: all.filter(a => a.status === "Confirmed").length,
    pending:   all.filter(a => a.status === "Pending").length,
    cancelled: all.filter(a => a.status === "Cancelled").length,
  };

  const filtered = all.filter(a => {
    if (status !== "all" && a.status.toLowerCase() !== status) return false;
    if (ticket !== "all" && a.ticket !== ticket) return false;
    if (query) {
      const q = query.toLowerCase();
      if (!a.name.toLowerCase().includes(q) &&
          !a.email.toLowerCase().includes(q) &&
          !a.company.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  function toggleSort(key) {
    if (sortKey === key) setSortDir(sortDir === "asc" ? "desc" : "asc");
    else { setSortKey(key); setSortDir("asc"); }
  }

  function toggleRow(id) {
    const next = new Set(selected);
    if (next.has(id)) next.delete(id); else next.add(id);
    setSelected(next);
  }
  function toggleAll() {
    if (selected.size === filtered.length) setSelected(new Set());
    else setSelected(new Set(filtered.map(a => a.id)));
  }

  const statusPill = (s) => {
    if (s === "Confirmed") return <span className="badge badge-success">{s}</span>;
    if (s === "Pending")   return <span className="badge badge-warning">{s}</span>;
    return <span className="badge badge-muted">{s}</span>;
  };

  const tabs = [
    { id: "all",       label: "All" },
    { id: "confirmed", label: "Confirmed" },
    { id: "pending",   label: "Pending" },
    { id: "cancelled", label: "Cancelled" },
  ];

  const allChecked = filtered.length > 0 && filtered.every(a => selected.has(a.id));

  return (
    <div className="flex flex-col gap-5">
      {/* Header */}
      <div className="flex items-start justify-between gap-4">
        <div>
          <h2 className="font-display text-[26px] font-semibold tracking-tight">Registrations</h2>
          <p className="text-[13.5px] text-muted-fg mt-0.5">Everyone who has signed up for Azure Fest.</p>
        </div>
        <div className="flex gap-2">
          <button className="btn btn-outline btn-sm"><Icons.Download size={14}/>Export CSV</button>
          <button className="btn btn-primary btn-sm"><Icons.Plus size={14}/>Add attendee</button>
        </div>
      </div>

      {/* Summary strip */}
      <div className="card">
        <div className="grid grid-cols-4 divide-x divide-default">
          {[
            ["Total",     counts.all,       "of 250 capacity"],
            ["Confirmed", counts.confirmed, "email verified"],
            ["Pending",   counts.pending,   "awaiting verification"],
            ["Cancelled", counts.cancelled, "spots freed"],
          ].map(([l,v,s]) => (
            <div key={l} className="p-5">
              <div className="eyebrow">{l}</div>
              <div className="flex items-baseline gap-2 mt-1.5">
                <span className="num text-[24px] font-semibold">{v}</span>
                <span className="text-[12px] text-muted-fg">{s}</span>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Toolbar: tabs + filters */}
      <div className="flex flex-wrap items-center gap-3 justify-between">
        <div className="flex items-center gap-1 border border-default rounded-[var(--radius)] bg-card p-0.5">
          {tabs.map(t => (
            <button key={t.id}
              onClick={() => setStatus(t.id)}
              className={"px-3 h-7 rounded-[calc(var(--radius)-2px)] text-[13px] flex items-center gap-1.5 " +
                (status === t.id ? "bg-muted text-foreground font-medium" : "text-muted-fg hover:text-foreground")}>
              {t.label}
              <span className="num text-[11px] text-muted-fg">{counts[t.id]}</span>
            </button>
          ))}
        </div>
        <div className="flex items-center gap-2 flex-1 justify-end">
          <div className="relative flex items-center">
            <Icons.Search size={14} className="absolute left-2.5 text-muted-fg"/>
            <input className="input pl-8 h-8 w-64 text-[13px]" placeholder="Search name, email, company…"
                   value={query} onChange={e => setQuery(e.target.value)}/>
          </div>
          <select className="input h-8 text-[13px] w-auto" value={ticket} onChange={e => setTicket(e.target.value)}>
            {ticketNames.map(t => (
              <option key={t} value={t}>{t === "all" ? "All tickets" : t}</option>
            ))}
          </select>
          <button className="btn btn-outline btn-sm"><Icons.Filter size={14}/>More</button>
        </div>
      </div>

      {/* Bulk action bar when rows are selected */}
      {selected.size > 0 && (
        <div className="card px-4 py-2.5 flex items-center gap-3 bg-primary/5"
             style={{borderColor:"color-mix(in oklch, var(--primary) 30%, var(--border))"}}>
          <span className="text-[13px] font-medium">{selected.size} selected</span>
          <span className="text-muted-fg text-[12.5px]">·</span>
          <button className="btn btn-ghost btn-sm"><Icons.Mail size={14}/>Email selected</button>
          <button className="btn btn-ghost btn-sm"><Icons.CheckCircle size={14}/>Mark confirmed</button>
          <button className="btn btn-ghost btn-sm text-destructive"><Icons.Trash size={14}/>Cancel registration</button>
          <button className="btn btn-ghost btn-sm ml-auto" onClick={() => setSelected(new Set())}>Clear</button>
        </div>
      )}

      {/* Table */}
      <div className="card overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-[13.5px]">
            <thead className="bg-muted/40">
              <tr className="text-left text-muted-fg text-[12px] uppercase tracking-wide">
                <th className="w-10 px-4 py-2.5">
                  <input type="checkbox" className="h-3.5 w-3.5 align-middle"
                         checked={allChecked}
                         onChange={toggleAll}/>
                </th>
                <HeadCell label="Attendee" k="name"       sortKey={sortKey} sortDir={sortDir} onSort={toggleSort}/>
                <HeadCell label="Company"  k="company"    sortKey={sortKey} sortDir={sortDir} onSort={toggleSort}/>
                <HeadCell label="Ticket"   k="ticket"     sortKey={sortKey} sortDir={sortDir} onSort={toggleSort}/>
                <HeadCell label="Status"   k="status"     sortKey={sortKey} sortDir={sortDir} onSort={toggleSort}/>
                <HeadCell label="Reconfirm" k="reconfirmed" sortKey={sortKey} sortDir={sortDir} onSort={toggleSort}/>
                <HeadCell label="Registered" k="registered" sortKey={sortKey} sortDir={sortDir} onSort={toggleSort}/>
                <th className="w-10"></th>
              </tr>
            </thead>
            <tbody>
              {filtered.length === 0 && (
                <tr><td colSpan={8} className="text-center py-10 text-muted-fg text-[13px]">No attendees match these filters.</td></tr>
              )}
              {filtered.map(a => (
                <tr key={a.id} className="row border-t border-default">
                  <td className="px-4 py-3">
                    <input type="checkbox" className="h-3.5 w-3.5 align-middle"
                           checked={selected.has(a.id)}
                           onChange={() => toggleRow(a.id)}/>
                  </td>
                  <td className="px-3 py-3">
                    <div className="flex items-center gap-2.5 cursor-pointer hover:opacity-80"
                         onClick={() => window.__nav?.goto("attendee", {attendeeId: a.id})}>
                      <div className="h-7 w-7 rounded-full bg-muted grid place-items-center text-[11px] font-semibold text-muted-fg">
                        {a.name.split(" ").map(s=>s[0]).slice(0,2).join("")}
                      </div>
                      <div className="min-w-0">
                        <div className="font-medium truncate hover:underline">{a.name}</div>
                        <div className="text-[12px] text-muted-fg truncate">{a.email}</div>
                      </div>
                    </div>
                  </td>
                  <td className="px-3 py-3 text-muted-fg">{a.company}</td>
                  <td className="px-3 py-3">
                    <span className="badge badge-muted">{a.ticket}</span>
                  </td>
                  <td className="px-3 py-3">{statusPill(a.status)}</td>
                  <td className="px-3 py-3">
                    {a.reconfirmed
                      ? <span className="inline-flex items-center gap-1 text-[12.5px] text-success"><Icons.Check size={12}/>Reconfirmed</span>
                      : <span className="text-[12.5px] text-muted-fg">—</span>}
                  </td>
                  <td className="px-3 py-3 text-muted-fg text-[12.5px]">{a.registered}</td>
                  <td className="px-2 py-3">
                    <button className="btn btn-ghost btn-sm h-7 w-7 p-0"><Icons.Dots size={14}/></button>
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="flex items-center justify-between px-4 py-3 border-t border-default text-[12.5px] text-muted-fg">
          <span>Showing <span className="num text-foreground">{filtered.length}</span> of <span className="num text-foreground">{all.length}</span></span>
          <div className="flex items-center gap-1">
            <button className="btn btn-ghost btn-sm h-7" disabled>Previous</button>
            <button className="btn btn-ghost btn-sm h-7">Next</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function HeadCell({ label, k, sortKey, sortDir, onSort }) {
  const active = sortKey === k;
  return (
    <th className="px-3 py-2.5 font-medium cursor-pointer select-none hover:text-foreground"
        onClick={() => onSort(k)}>
      <span className="inline-flex items-center gap-1">
        {label}
        {active && (sortDir === "asc" ? <Icons.ChevUp size={12}/> : <Icons.Chevron size={12}/>)}
      </span>
    </th>
  );
}

  );
}

function TicketTypeCard({ t }) {

  return (
    <div className="card overflow-hidden">
      <div className="p-5">
        <div className="flex items-start justify-between gap-3">
          <div className="min-w-0">

              {t.closed ? (
                <span className="badge badge-muted">Closed</span>
              ) : t.hidden ? (
                <span className="badge badge-muted"><Icons.EyeOff size={11}/>Hidden</span>
              ) : (
                <span className="badge badge-success"><span className="pulse-dot"></span>On sale</span>
              )}
            </div>
            <p className="text-[12.5px] text-muted-fg font-mono">{t.slug}</p>
          </div>
          <button className="btn btn-ghost btn-sm"><Icons.Dots size={16}/></button>

        <div className="grid grid-cols-3 gap-4 mt-4">
          <div>
            <div className="text-[11px] uppercase tracking-wide text-muted-fg">Sold</div>
            <div className="num text-[22px] font-semibold mt-0.5">{t.sold}</div>
          </div>
          <div>
            <div className="text-[11px] uppercase tracking-wide text-muted-fg">Remaining</div>
            <div className={"num text-[22px] font-semibold mt-0.5 " + (remaining===0 ? "text-muted-fg" : "")}>{remaining}</div>
          </div>
          <div>
            <div className="text-[11px] uppercase tracking-wide text-muted-fg">Price</div>
            <div className="num text-[22px] font-semibold mt-0.5">{t.price === 0 ? "Free" : `€${t.price}`}</div>
          </div>
        </div>

        <div className="mt-4">
          <div className="bar"><span style={{width: pct + "%", background: t.closed ? "var(--muted-foreground)" : undefined, opacity: t.closed ? 0.5 : 1}}></span></div>
          <div className="flex justify-between text-[11px] text-muted-fg mt-1.5 num">
            <span>{pct}% sold</span>
            <span>cap {t.cap}</span>

    </div>
  );
}

          <div className="grid grid-cols-1 gap-1">
            {[["dashboard","Dashboard"],["tickets","Ticket types"],["settings","Settings hub"]].map(([v,l]) => (
              <button key={v} onClick={()=>setPage(v)} className="tab justify-start" data-active={page===v?"true":"false"} style={{padding:".4rem .5rem", fontSize:"12.5px"}}>{l}</button>
            ))}
          </div>
        </TweakGroup>
      </div>
    </div>
  );
}
function TweakGroup({ label, children }) {
  return (
    <div>
      <div className="eyebrow mb-1.5">{label}</div>
      {children}
    </div>
  );
}

function TweaksToggle({ open, setOpen }) {
  if (open) return null;
  return (
    <button className="tweaks" style={{width:"auto", padding:"8px 12px"}} onClick={()=>setOpen(true)}>
      <div className="flex items-center gap-2">
        <Icons.Palette size={14} className="text-primary"/>
        <span className="text-[13px] font-medium">Tweaks</span>
      </div>
    </button>
  );
}

window.TweaksPanel = TweaksPanel;
window.TweaksToggle = TweaksToggle;


//====== app.jsx ======
// Main app
function App() {
  const [theme, setTheme] = useState(() => localStorage.getItem("admitto.theme") || "editorial");
  const [dark, setDark] = useState(() => localStorage.getItem("admitto.dark") === "1");
  const [density, setDensity] = useState(() => localStorage.getItem("admitto.density") || "comfortable");
  const [page, setPage] = useState(() => localStorage.getItem("admitto.page") || "dashboard");
  const [attendeeId, setAttendeeId] = useState(null);
  const [tweaksOpen, setTweaksOpen] = useState(false);

  const goto = React.useCallback((p, opts = {}) => {
    if (opts.attendeeId !== undefined) setAttendeeId(opts.attendeeId);
    setPage(p);
  }, []);
  React.useEffect(() => { window.__nav = { goto }; }, [goto]);

  React.useEffect(() => {
    document.body.className = `theme-${theme} density-${density}` + (dark ? " dark" : "");
    localStorage.setItem("admitto.theme", theme);
    localStorage.setItem("admitto.dark", dark ? "1" : "0");
    localStorage.setItem("admitto.density", density);
    localStorage.setItem("admitto.page", page);
  }, [theme, dark, density, page]);

  return (
    <div className="flex h-screen w-screen overflow-hidden">
      <SidebarNav page={page} setPage={setPage}/>
      <div className="flex-1 flex flex-col min-w-0">
        <AppHeader page={page} showDark={dark} setShowDark={setDark}/>
        <main className="flex-1 overflow-auto">
          <div className="max-w-[1360px] mx-auto px-6 lg:px-8 py-7">
            {page==="dashboard" && <Dashboard/>}
            {page==="tickets" && <TicketsPage/>}
            {page==="settings" && <SettingsHub/>}
            {page==="registrations" && <RegistrationsPage/>}
            {page==="attendee" && <AttendeePage attendeeId={attendeeId}/>}
          </div>
        </main>
      </div>
      <TweaksToggle open={tweaksOpen} setOpen={setTweaksOpen}/>
      <TweaksPanel theme={theme} setTheme={setTheme} dark={dark} setDark={setDark}
                   density={density} setDensity={setDensity}
                   page={page} setPage={setPage}
                   open={tweaksOpen} setOpen={setTweaksOpen}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);


</script>
</body>
</html>
